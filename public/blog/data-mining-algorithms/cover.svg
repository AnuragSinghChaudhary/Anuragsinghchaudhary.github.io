<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Essential data mining algorithms</title>
  <desc id="desc">Illustration showing major algorithm families in data mining.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#172554"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="84" y="92" fill="#f8fafc" font-size="56" font-family="Arial, sans-serif" font-weight="700">11 Essential Data Mining Algorithms</text>
  <g font-family="Arial, sans-serif" font-size="24" font-weight="700">
    <g fill="#dbeafe">
      <rect x="96" y="150" width="220" height="72" rx="20"/>
      <text x="126" y="194" fill="#1e3a8a">Regression</text>
      <rect x="346" y="150" width="220" height="72" rx="20"/>
      <text x="397" y="194" fill="#1e3a8a">Clustering</text>
      <rect x="596" y="150" width="220" height="72" rx="20"/>
      <text x="654" y="194" fill="#1e3a8a">Neural Nets</text>
      <rect x="846" y="150" width="258" height="72" rx="20"/>
      <text x="882" y="194" fill="#1e3a8a">Ensembles</text>
    </g>
    <g fill="#bfdbfe">
      <rect x="146" y="286" width="220" height="72" rx="20"/>
      <text x="198" y="330" fill="#1d4ed8">Bayesian</text>
      <rect x="422" y="286" width="276" height="72" rx="20"/>
      <text x="454" y="330" fill="#1d4ed8">Dimensionality</text>
      <rect x="754" y="286" width="220" height="72" rx="20"/>
      <text x="790" y="330" fill="#1d4ed8">Decision Trees</text>
    </g>
  </g>
  <g fill="#93c5fd" opacity=".75">
    <circle cx="260" cy="470" r="70"/>
    <circle cx="470" cy="470" r="70"/>
    <circle cx="680" cy="470" r="70"/>
    <circle cx="890" cy="470" r="70"/>
  </g>
  <text x="124" y="491" fill="#082f49" font-size="24" font-family="Arial, sans-serif" font-weight="700">SVM</text>
  <text x="416" y="491" fill="#082f49" font-size="24" font-family="Arial, sans-serif" font-weight="700">PCA</text>
  <text x="620" y="491" fill="#082f49" font-size="24" font-family="Arial, sans-serif" font-weight="700">k-Means</text>
  <text x="812" y="491" fill="#082f49" font-size="24" font-family="Arial, sans-serif" font-weight="700">Boosting</text>
</svg>
