  <text x="110" y="74" fill="#dbeafe" font-size="28" font-family="Arial, sans-serif">A practical stack for analysis, visualization, and modeling.</text>
  <text x="110" y="580" fill="#f8fafc" font-size="56" font-family="Arial, sans-serif" font-weight="700">Python Libraries for Data Science</text>
