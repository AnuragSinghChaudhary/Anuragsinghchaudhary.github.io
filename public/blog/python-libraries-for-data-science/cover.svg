    <rect x="158" y="166" width="168" height="76" rx="18" fill="#fde68a"/>
    <text x="194" y="214" fill="#92400e" font-size="30">NumPy</text>
    <rect x="356" y="166" width="168" height="76" rx="18" fill="#bfdbfe"/>
    <text x="387" y="214" fill="#1d4ed8" font-size="30">Pandas</text>
    <rect x="554" y="166" width="196" height="76" rx="18" fill="#a7f3d0"/>
