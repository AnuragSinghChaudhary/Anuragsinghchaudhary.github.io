<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Seven steps of a machine learning project</title>
  <desc id="desc">Illustration of a seven-step machine learning workflow.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="84" y="92" fill="#f8fafc" font-size="56" font-family="Arial, sans-serif" font-weight="700">Seven Steps of a Machine Learning Project</text>
  <g font-family="Arial, sans-serif" font-size="24" font-weight="700">
    <g transform="translate(84 170)">
      <rect width="132" height="132" rx="24" fill="#dcfce7"/>
      <text x="28" y="74" fill="#14532d">1. Data</text>
    </g>
    <g transform="translate(246 170)">
      <rect width="132" height="132" rx="24" fill="#bbf7d0"/>
      <text x="14" y="74" fill="#14532d">2. Prepare</text>
    </g>
    <g transform="translate(408 170)">
      <rect width="132" height="132" rx="24" fill="#86efac"/>
      <text x="18" y="74" fill="#14532d">3. Model</text>
    </g>
    <g transform="translate(570 170)">
      <rect width="132" height="132" rx="24" fill="#4ade80"/>
      <text x="20" y="74" fill="#14532d">4. Train</text>
    </g>
    <g transform="translate(732 170)">
      <rect width="132" height="132" rx="24" fill="#22c55e"/>
      <text x="8" y="74" fill="#ecfdf5">5. Evaluate</text>
    </g>
    <g transform="translate(894 170)">
      <rect width="132" height="132" rx="24" fill="#16a34a"/>
      <text x="16" y="74" fill="#ecfdf5">6. Tune</text>
    </g>
    <g transform="translate(1056 170)">
      <rect width="60" height="132" rx="24" fill="#15803d"/>
    </g>
  </g>
  <g stroke="#dcfce7" stroke-width="6" fill="none" stroke-linecap="round">
    <path d="M218 236H240"/>
    <path d="M380 236H402"/>
    <path d="M542 236H564"/>
    <path d="M704 236H726"/>
    <path d="M866 236H888"/>
    <path d="M1028 236H1048"/>
  </g>
  <g transform="translate(84 370)">
    <rect width="1032" height="148" rx="28" fill="#052e16" opacity=".68"/>
    <text x="34" y="58" fill="#dcfce7" font-size="28" font-family="Arial, sans-serif">A durable workflow for practical machine learning in 2026.</text>
    <text x="34" y="108" fill="#bbf7d0" font-size="24" font-family="Arial, sans-serif">Good data, realistic evaluation, and deployment thinking matter more than hype.</text>
  </g>
</svg>
