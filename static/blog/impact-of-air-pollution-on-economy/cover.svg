<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Impact of air pollution on the economy</title>
  <desc id="desc">Illustration with skyline, pollution cloud, and rising economic metrics.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#09203f"/>
      <stop offset="100%" stop-color="#537895"/>
    </linearGradient>
    <linearGradient id="smog" x1="0%" x2="100%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity=".9"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity=".5"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1020" cy="120" r="58" fill="#fcd34d" opacity=".9"/>
  <path d="M0 390C105 360 180 420 280 395s178-108 284-85 141 98 254 91 183-87 382-67V630H0Z" fill="#0f172a"/>
  <g fill="#cbd5e1" opacity=".88">
    <rect x="150" y="290" width="80" height="190" rx="6"/>
    <rect x="250" y="250" width="92" height="230" rx="6"/>
    <rect x="370" y="210" width="78" height="270" rx="6"/>
    <rect x="470" y="272" width="64" height="208" rx="6"/>
    <rect x="556" y="230" width="104" height="250" rx="6"/>
  </g>
  <g fill="url(#smog)">
