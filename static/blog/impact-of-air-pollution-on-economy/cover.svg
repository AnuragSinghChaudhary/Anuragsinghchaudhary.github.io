  <text x="85" y="120" fill="#f8fafc" font-size="56" font-family="Arial, sans-serif" font-weight="700">Impact of Air Pollution</text>
  <text x="85" y="182" fill="#f8fafc" font-size="56" font-family="Arial, sans-serif" font-weight="700">on the Economy</text>
  <text x="88" y="240" fill="#dbeafe" font-size="28" font-family="Arial, sans-serif">Health, productivity, and systems costs in one frame.</text>
